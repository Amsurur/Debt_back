# Render Blueprint. In the Render dashboard: New + > Blueprint, point at this repo.
# It creates a free Postgres DB and a web service wired together automatically.
services:
  - type: web
    name: debt-tracker-api
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm run migrate:prod && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PGSSL
        value: "true"
      - key: ACCESS_TOKEN_SECRET
        generateValue: true
      - key: REFRESH_TOKEN_SECRET
        generateValue: true
      - key: ACCESS_TOKEN_TTL
        value: 15m
      - key: REFRESH_TOKEN_TTL
        value: 7d
      - key: CORS_ORIGIN
        value: "*"
      - key: SERVER_URL
        value: "https://debt-back-prod.onrender.com"
      - key: DATABASE_URL
        fromDatabase:
          name: debt-tracker-db
          property: connectionString

databases:
  - name: debt-tracker-db
    plan: free
